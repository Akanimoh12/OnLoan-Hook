name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - testnet
          - mainnet

jobs:
  deploy:
    name: Deploy Contracts
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Build
        run: forge build

      - name: Deploy to Testnet
        if: github.event.inputs.environment == 'testnet'
        run: |
          forge script script/deploy/DeployOnLoan.s.sol \
            --rpc-url ${{ secrets.UNICHAIN_TESTNET_RPC_URL }} \
            --private-key ${{ secrets.DEPLOYER_PRIVATE_KEY }} \
            --broadcast \
            --verify
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}

      - name: Deploy to Mainnet
        if: github.event.inputs.environment == 'mainnet'
        run: |
          forge script script/deploy/DeployOnLoan.s.sol \
            --rpc-url ${{ secrets.UNICHAIN_RPC_URL }} \
            --private-key ${{ secrets.DEPLOYER_PRIVATE_KEY }} \
            --broadcast \
            --verify
        env:
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
